ai-log:
  # 是否保存 AI 对话日志到 AILog/ 目录
  save-enabled: ${SAVE_AI_LOG:false}

server:
  port: ${SERVER_PORT:9090}
  servlet:
    context-path: /api/ragstudio

spring:
  dotenv:
    location: ../.env     # .env 在项目根目录，bootstrap/ 是子模块
  application:
    name: ragstudio${unique-name:}-service

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RAGStudioHikariPool

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

rocketmq:
  name-server: ${ROCKETMQ_NAMESERVER}
  producer:
    group: ragstudio-producer${unique-name:}_pg
    send-message-timeout: 2000

rag:
  skills:
    dir: skills              # SKILL 目录（相对于项目根目录）
    allowed-commands: ""     # 允许执行的命令前缀白名单，空表示禁用 command 类型
    script-timeout-ms: 30000 # 脚本执行超时（毫秒）
    sandbox:
      enabled: ${SANDBOX_ENABLED:true}   # 是否启用 Docker 沙箱（false 则禁止所有 script/command 执行）
      image: ${SANDBOX_IMAGE:sandbox:latest}  # 沙箱镜像
      memory: 256m           # 内存限制
      cpus: "0.5"            # CPU 限制
      timeout-ms: 30000      # 执行超时
  semantic-highlight:
    enabled: ${SEMANTIC_HIGHLIGHT_ENABLED:true}   # ContextCropper 启用语义裁剪时连接 Python 服务
    base-url: ${SEMANTIC_HIGHLIGHT_BASE_URL:http://localhost:8001}
    connect-timeout: 5s
    read-timeout: ${SEMANTIC_HIGHLIGHT_READ_TIMEOUT:120s}

  vector:
    type: pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: ${MAX_CONCURRENT:1}
      max-wait-seconds: 15
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 6
    compress-threshold: 12   # 超过 6 轮到 12 轮时触发压缩，压缩后保留 6 轮原文
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  search:
    default-top-k: ${DEFAULT_TOP_K:10}

    channels:
      # 向量全局检索（当前已禁用：VectorGlobalSearchChannel.isEnabled() 返回 false）
      vector-global:
        enabled: false
        top-k-multiplier: 3

      # 知识库选择检索（用户选定知识库后生效）
      knowledge-base-selection:
        top-k-multiplier: 2

      # 关键词检索（基于 pg_trgm gin_trgm_ops 索引）
      keyword:
        enabled: true
        top-k-multiplier: 2

      # 混合检索：向量 + 关键词 → RRF 融合
      hybrid-rrf:
        enabled: true
        k: 60                # RRF 平滑常数
        top-k: 5             # 融合后最终返回的结果数

  trace:
    enabled: ${TRACE_ENABLED:true}
    max-error-length: 1000

  model-routing:
    selection:
      failure-threshold: 2
      open-duration-ms: 30000
    stream:
      message-chunk-size: 1

rustfs:
  url: ${RUSTFS_URL}
  access-key-id: ${RUSTFS_ACCESS_KEY}
  secret-access-key: ${RUSTFS_SECRET_KEY}

sa-token:
  token-name: Authorization
  timeout: ${TOKEN_TIMEOUT:2592000}
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

logging:
  level:
    # MCP SDK 在连接某些 SSE 端点时会打印非关键警告，降级以避免干扰
    io.modelcontextprotocol: ERROR

app:
  demo-mode: ${DEMO_MODE:false}
  default-avatar-url: "${DEFAULT_AVATAR_URL:https://avatars.githubusercontent.com/u/583231?v=4}"
